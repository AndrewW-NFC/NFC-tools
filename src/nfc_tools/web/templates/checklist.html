{% extends "base.html" %}
{% block content %}

<h1>Recording Checklist</h1>

<section class="recording-checklist" aria-labelledby="recording-checklist-title">
  <h2 id="recording-checklist-title">Before recording</h2>
  <p class="muted">
    Use this as a memory aid before recording. Checking or not checking these boxes does not change how the recorder runs.
  </p>

  <div class="recording-checklist-items">
    {% for item in recording_checklist["items"] %}
      <label class="recording-checklist-item" for="recording-checklist-{{ item.id }}">
        <input id="recording-checklist-{{ item.id }}" type="checkbox" autocomplete="off">
        <span>
          <strong>{{ item.label }}</strong>
          {% if item.detail %}
            <small>{{ item.detail }}</small>
          {% endif %}
        </span>
      </label>
    {% endfor %}
  </div>
</section>

{% endblock %}
