<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>NFC Tools</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/static/style.css?v=v41-dashboard-cleanup">
  <link rel="stylesheet" href="/static/settings_page.css?v=v39-date-meter-location">
</head>
<body>
<header class="topbar">
  <nav class="main-nav" aria-label="Main navigation">
    <a href="/dashboard" class="{% if request.url.path == '/dashboard' or request.url.path == '/' %}active{% endif %}">NFC Tools</a>
    <a href="/settings" class="{% if request.url.path.startswith('/settings') %}active{% endif %}">Settings</a>
    <a href="/detections" class="{% if request.url.path.startswith('/detections') %}active{% endif %}">Detections</a>
    <a href="/schedule" class="{% if request.url.path.startswith('/schedule') %}active{% endif %}">Auto-record</a>
    <a href="/diagnostics" class="{% if request.url.path.startswith('/diagnostics') %}active{% endif %}">Diagnostics</a>
  </nav>
</header>
<main>
  {% block content %}{% endblock %}
</main>
<footer>NFC Tools - <a href="https://github.com/AndrewW-NFC/NFC-tools" target="_blank" rel="noopener">GitHub</a> - <a href="https://github.com/AndrewW-NFC/NFC-tools/blob/main/LICENSE" target="_blank" rel="noopener">License</a></footer>
<script src="/static/app.js?v=v45-final-stability-pass"></script>
</body>
</html>
