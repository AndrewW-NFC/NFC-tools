name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and development tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile Python package
        run: python -m compileall -q src/nfc_tools

      - name: Run tests
        run: pytest -q

      - name: Check browser JavaScript syntax
        run: |
          node --check src/nfc_tools/web/static/app.js
          node --check src/nfc_tools/web/static/diagnostics_page.js
          node --check src/nfc_tools/web/static/import_page.js
          node --check src/nfc_tools/web/static/settings_page.js

      - name: Build wheel
        run: |
          python -m pip install build
          python -m build --wheel

      - name: Install built wheel
        run: |
          python -m pip uninstall -y nfc-tools
          python -c "import glob, subprocess, sys; wheels = glob.glob('dist/*.whl'); assert len(wheels) == 1, wheels; subprocess.check_call([sys.executable, '-m', 'pip', 'install', wheels[0]])"

      - name: Check installed command line entry points
        run: |
          nfc --help
          nfc --version
          python -m nfc_tools --help

      - name: Check installed web assets
        run: python -c "from importlib.resources import files; root = files('nfc_tools.web'); assert (root / 'templates' / 'dashboard.html').is_file(); assert (root / 'templates' / 'import_recordings.html').is_file(); assert (root / 'static' / 'app.js').is_file(); assert (root / 'static' / 'import_page.js').is_file()"
